<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/app.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brandmark" href="{{ request.url_for('home') }}">{{ app_name }}</a>
        <nav class="topnav">
          <a href="{{ request.url_for('home') }}">Home</a>
          <a href="{{ request.url_for('about') }}">About</a>
        </nav>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
